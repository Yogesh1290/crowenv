[package]
name = "crowenv"
version = "1.0.0"
edition = "2021"
description = "CrowEnv — Smart secrets. Like a crow. 🐦 AES-256-GCM encrypted .cenv replacement for plain .env files"
license = "MIT"
repository = "https://github.com/Yogesh1290/crowenv"
keywords = ["env", "secrets", "encryption", "security", "crowenv"]
categories = ["command-line-utilities", "cryptography"]

[[bin]]
name = "crowenv"
path = "src/main.rs"

[dependencies]
aes-gcm = { version = "0.10", features = ["std"] }
pbkdf2  = { version = "0.12", features = ["simple"] }
sha2    = "0.10"
rand    = "0.8"
serde   = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64  = "0.22"
hmac    = "0.12"

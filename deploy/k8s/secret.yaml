---
# Kubernetes Secret — stores CENV_MASTER_KEY securely
# Usage: kubectl apply -f secret.yaml
#
# Generate base64 value:
#   echo -n "your-master-key-here" | base64
#
# IMPORTANT: For production, use:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault Agent Injector
#   - Sealed Secrets (Bitnami)
# This file is for demonstration only.

apiVersion: v1
kind: Secret
metadata:
  name: cenv-master-key
  namespace: default
  labels:
    app.kubernetes.io/managed-by: cenv
type: Opaque
data:
  # base64 of your actual CENV_MASTER_KEY
  CENV_MASTER_KEY: eW91ci1tYXN0ZXIta2V5LWhlcmU=
